# Pinned local toolchain for contributors and CI. The Go version matches the
# CI toolchain; the module minimum stays in go.mod.
[settings]
experimental = true
lockfile = true

[tools]
go = "1.26.4"
golangci-lint = "2.12.2"

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run --timeout 3m"

[tasks.test]
description = "Run the Go test suite"
run = "go test ./..."

[tasks.build]
description = "Build a local terminal-to-llm binary into dist/"
run = "mkdir -p dist && go build -o dist/terminal-to-llm ."

[tasks.ci]
description = "Run the CI checks"
depends = ["lint", "test"]
